# Servidor Syslog centralizado para el laboratorio (ejecutar en el host con Docker)
# Uso: docker compose -f lab/docker-compose.syslog.yml up -d
# IP del host en LAN: configurar pfSense/Suricata para enviar a esa IP:514

services:
  syslog:
    image: rsyslog/rsyslog_alpine
    container_name: lab-syslog
    ports:
      - "514:514/udp"
      - "514:514/tcp"
    volumes:
      - ./syslog/rsyslog.conf:/etc/rsyslog.conf:ro
      - syslog-data:/var/log
    restart: unless-stopped

volumes:
  syslog-data:
